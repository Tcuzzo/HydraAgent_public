schema: hydra.tool_contract_set.v1
tools:
  - tool_id: skill_library.search
    name: Skill Library Search
    description: Search the materialized Hydra SKILL.md library and return compact planner-ready skill hits.
    risk: read_only
    executor: hydra.skill_connectors:skill_search
    input_schema:
      type: object
      required:
        - query
      properties:
        query:
          type: string
        skills_root:
          type: string
          default: hydra/schemes
        limit:
          type: integer
          default: 8
    approval:
      required: false
    policy:
      read_only: true
      returns_compact_summaries_only: true
  - tool_id: skill_list
    name: Skill List
    description: List trusted local skill contracts, including the generated Hydra catalog, with bounded output.
    risk: read_only
    executor: hydra.skill_connectors:skill_list
    input_schema:
      type: object
      properties:
        query:
          type: string
          default: ""
        limit:
          type: integer
          default: 20
    approval:
      required: false
    policy:
      read_only: true
      returns_compact_summaries_only: true
  - tool_id: skill_search
    name: Skill Search
    description: Alias connector for searching Hydra's materialized SKILL.md library.
    risk: read_only
    executor: hydra.skill_connectors:skill_search
    input_schema:
      type: object
      required:
        - query
      properties:
        query:
          type: string
        skills_root:
          type: string
          default: hydra/schemes
        limit:
          type: integer
          default: 8
    approval:
      required: false
    policy:
      read_only: true
      returns_compact_summaries_only: true
  - tool_id: skill_show
    name: Skill Show
    description: Show one trusted skill by name with source path and compact instructions.
    risk: read_only
    executor: hydra.skill_connectors:skill_show
    input_schema:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        max_chars:
          type: integer
          default: 4000
    approval:
      required: false
    policy:
      read_only: true
      local_skill_paths_only: true
  - tool_id: skill_route
    name: Skill Route
    description: Route an operator prompt to trusted skills and native capability cards.
    risk: read_only
    executor: hydra.skill_connectors:skill_route
    input_schema:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
    approval:
      required: false
    policy:
      read_only: true
      local_skill_paths_only: true
