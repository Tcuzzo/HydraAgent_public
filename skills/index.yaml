# Skill index — the Python runtime tool modules under skills/ that the
# agent runtime discovers at startup.
#
# A skill enters this index only once it is implemented and wired into the
# runtime; `proven_by` records the provenance of that promotion (a promotion
# tag from the original build, or the runtime seam that exercises it here).

skills:
  - name: fs_read
    module: skills.fs_read
    entry: run
    proven_by: "§10.6-fs-read"
    summary: Bounded filesystem read within a declared root.

  - name: http_fetch
    module: skills.http_fetch
    entry: run
    proven_by: "§10.6-http-fetch"
    summary: Bounded HTTP GET against an allow-listed host.

  - name: git_diff
    module: skills.git_diff
    entry: run
    proven_by: "§10.6-git-diff"
    summary: "`git diff --stat` inside a verified worktree."

  - name: fs_write
    module: skills.fs_write
    entry: run
    proven_by: "§10.21-fs-write"
    summary: Bounded, atomic write under a declared root (overwrite is opt-in).

  - name: bash
    module: skills.bash
    entry: run
    proven_by: "§10.26-bash"
    summary: Bounded shell command execution under a scoped cwd, with process-group kill on timeout.

  - name: glob
    module: skills.glob_files
    entry: run
    proven_by: "§10.27-glob"
    summary: List files under a declared root matching a glob pattern (refuses absolute / traversal patterns).

  - name: grep
    module: skills.grep_files
    entry: run
    proven_by: "§10.28-grep"
    summary: Regex / literal search across files under a declared root, scoped by path_pattern.

  - name: fs_edit
    module: skills.fs_edit
    entry: run
    proven_by: "§10.30-fs-edit"
    summary: Surgical search/replace inside a file under a declared root (atomic, refuses ambiguous edits).

  - name: list_directory
    module: skills.list_directory
    entry: run
    proven_by: "§10.31-list-directory"
    summary: Enumerate immediate children of a directory under a declared root (with name/type/size).

  - name: todo
    module: skills.todo
    entry: run
    proven_by: "§10.32-todo"
    summary: Persistent per-workspace task list (list/add/done/undone/remove/clear), monotonic ids.

  - name: system_stats
    module: skills.system_stats
    entry: run
    proven_by: "wired: hydra/cli/tool_binding.py (agent-loop tool system_stats)"
    summary: Read-only snapshot of host CPU load, memory, disk usage, and process count.

  - name: web_extract
    module: skills.web_extract
    entry: run
    proven_by: "wired: hydra/verify_claim.py + hydra/cli/cmd_ops.py"
    summary: Fetch a URL via the http_fetch contract and extract clean readable text from its HTML (stdlib-only parser).

  - name: browse_agent
    module: skills.browse_agent
    entry: run
    proven_by: "wired: hydra/cli/tool_binding.py (agent-loop tool browse)"
    summary: Goal-directed agentic browsing (snapshot -> decide -> act) on Hydra's own browser bridge, bounded by max_steps.
