name: ci

on:
  push:
  pull_request:

jobs:
  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  unsafe-code-scan:
    name: unsafe-code scan (no pickle / eval-on-data)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: scan for unsafe deserialization / dynamic exec
        run: |
          set -e
          # Anchor on real Python syntax (import statement / attribute call) so that
          # English prose -- e.g. "marshal completion to UI" in a docstring -- cannot
          # trip the guard, while genuinely unsafe code still does. A bare word match
          # cannot tell code from prose; this can.
          mods='pickle|cPickle|dill|marshal|shelve|jsonpickle'
          hits=$(grep -rnE \
            "^[[:space:]]*(import|from)[[:space:]]+([A-Za-z0-9_.]+[[:space:]]*,[[:space:]]*)*($mods)\b|\b($mods)\.[A-Za-z_][A-Za-z0-9_]*\(|yaml\.load\(|allow_pickle|__reduce__|(^|[^.[:alnum:]_])(eval|exec)[[:space:]]*\(" \
            --include='*.py' . \
            | grep -v '/test' \
            | grep -vE '\bdef[[:space:]]+(eval|exec)[[:space:]]*\(' \
            | grep -vE 'yaml\.load\([^)]*SafeLoader' \
            || true)
          if [ -n "$hits" ]; then
            echo "Unsafe deserialization / dynamic-exec patterns found:"; echo "$hits"; exit 1
          fi
          echo "clean: no pickle/unsafe-deserialization/dynamic-exec in shipped code"

  ip-topology-scan:
    name: ip/topology scan (private LAN IP leak)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: scan for private LAN / topology IPs (gitleaks misses IPs)
        run: bash .github/scripts/ip-topology-scan.sh

  smoke:
    name: smoke (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: install
        run: pip install -e . -c constraints.txt
      - name: import + CLI smoke (cross-platform)
        run: |
          python -m hydra --help
          python -m hydra tools
          python -c "import hydra.cli.cmd_ask, hydra.cli.cmd_chat, hydra.loop, hydra.proc"
      - name: tests
        run: |
          pip install -e ".[test]" -c constraints.txt
          pytest -q
